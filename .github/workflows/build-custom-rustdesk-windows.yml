name: Build Custom RustDesk Windows Client

on:
  workflow_dispatch:

env:
  RENDEZVOUS_SERVER: "monitor.joyit.com.br"
  RS_PUB_KEY: "zQ31WqTAB60to3bKIKqM7L4FohTncaXPyhXJWM6qx6s="

jobs:
  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch config.rs with custom server
        run: |
          $configPath = "libs\hbb_common\src\config.rs"
          (Get-Content $configPath) `
            -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"$env:RENDEZVOUS_SERVER`"];" `
            -replace 'pub const RS_PUB_KEY: &str = ".*";', "pub const RS_PUB_KEY: &str = `"$env:RS_PUB_KEY`";" |
            Set-Content $configPath
          Write-Host "Patched config.rs:"
          Select-String -Path $configPath -Pattern "RENDEZVOUS_SERVERS|RS_PUB_KEY"

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Flutter Windows desktop
        run: |
          flutter config --enable-windows-desktop
          flutter --version

      - name: Verify LLVM/Clang (for bindgen)
        run: |
          # GitHub Windows runners already ship with a recent LLVM/Clang.
          # Installing a pinned older version conflicts with it, so we just point to it.
          clang --version
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & $env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Pre-place compatible NASM (aom doesn't support NASM 3.x)
        run: |
          $toolsDir = "$env:USERPROFILE\vcpkg\downloads\tools\nasm\nasm-3.01"
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null
          Invoke-WebRequest -UseBasicParsing -Uri "https://www.nasm.us/pub/nasm/releasebuilds/2.16.01/win64/nasm-2.16.01-win64.zip" -OutFile "$env:TEMP\nasm.zip"
          Expand-Archive -Path "$env:TEMP\nasm.zip" -DestinationPath "$env:TEMP\nasm-extracted" -Force
          Copy-Item -Path "$env:TEMP\nasm-extracted\nasm-2.16.01\*" -Destination $toolsDir -Recurse -Force
          & "$toolsDir\nasm.exe" -v

      - name: Run vcpkg manifest install
        run: |
          $env:VCPKG_DEFAULT_TRIPLET = "x64-windows-static"
          $env:VCPKG_DEFAULT_HOST_TRIPLET = "x64-windows-static"
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $env:USERPROFILE\vcpkg\vcpkg.exe install --triplet x64-windows-static --x-manifest-root=. --x-install-root=$env:USERPROFILE\vcpkg\installed

      - name: Print vcpkg failure logs (if any)
        if: failure()
        run: |
          $logs = Get-ChildItem -Recurse -Path "$env:USERPROFILE\vcpkg\buildtrees" -Include "*.log" -ErrorAction SilentlyContinue
          if ($logs.Count -eq 0) {
            Write-Host "No log files found under buildtrees."
          }
          foreach ($log in $logs) {
            Write-Host "===== $($log.FullName) ====="
            Get-Content $log.FullName -Tail 150
            Write-Host ""
          }

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ env.USERPROFILE }}\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/**','vcpkg.json') }}

      - name: Install flutter_rust_bridge_codegen (matching pinned version)
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern 'flutter_rust_bridge\s*=\s*"([\d.]+)"').Matches.Groups[1].Value
          if (-not $version) { $version = "1.80.1" }
          Write-Host "Installing flutter_rust_bridge_codegen $version"
          cargo install flutter_rust_bridge_codegen --version $version --locked

      - name: Build RustDesk (Flutter, release)
        run: |
          pip install requests
          python build.py --flutter --hwcodec --portable

      - name: Locate build output
        id: locate
        run: |
          $exe = Get-ChildItem -Recurse -Path . -Filter "*.exe" | Where-Object { $_.FullName -match "release" } | Select-Object -First 1
          if ($exe) {
            echo "EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            Write-Host "Found: $($exe.FullName)"
          } else {
            Write-Error "No .exe found in release output"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-custom
          path: ${{ env.EXE_PATH }}
